version: '3.9'

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: crm_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-changeme_strong_password}"
      POSTGRES_DB:       netsuite_clone
    # Sin puerto público — solo accesible internamente entre contenedores
    volumes:
      - pg_data_v2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (NestJS API) ───────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:      "postgresql://postgres:${POSTGRES_PASSWORD:-changeme_strong_password}@postgres:5432/netsuite_clone?schema=public"
      JWT_SECRET:        "${JWT_SECRET:-change-me-in-production}"
      JWT_EXPIRES_IN:    "${JWT_EXPIRES_IN:-8h}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      CORS_ORIGINS:      "${CORS_ORIGINS:-http://localhost}"
      NODE_ENV:          "production"
      PORT:              3000
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (React + Nginx) ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crm_frontend
    restart: unless-stopped
    depends_on:
      - api

volumes:
  pg_data_v2:
